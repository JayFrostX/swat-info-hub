<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Admin Panel</h2>
<button onclick="logout()">Logout</button>

<hr>

<h2>Create Post</h2>
<textarea id="postContent"></textarea><br><br>
<button onclick="createPost()">Post</button>

<h2>Existing Posts</h2>
<div id="adminPosts"></div>

<hr>

<h2>Add Sidebar Button</h2>
<input id="buttonText" placeholder="Button Text">
<input id="buttonLink" placeholder="Link">
<button onclick="addButton()">Add</button>

<h2>Existing Sidebar Buttons</h2>
<div id="adminButtons"></div>

<!-- 🔥 Firebase MUST be loaded first -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- 🔥 Then your config -->
<script src="./firebase.js"></script>

<!-- 🔥 Then your logic -->
<script src="./app.js"></script>

</body>
</html>
